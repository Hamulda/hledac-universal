[pytest]
# Sprint F206A: pytest configuration for test taxonomy
# Note: no rootdir override — project root is already correct for pytest discovery.

# Known marks used across historical probe lanes.
# Unrecognised marks produce warnings; registering them silences those.
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    stress: marks tests as stress tests
    timeout: marks tests with explicit timeout
    unit: unit tests (default for probe lanes)
    integration: integration tests
    smoke: smoke tests
    hermetic: hermetic tests (no network, no real I/O)
    probe: probe lane tests (F200+ era)
