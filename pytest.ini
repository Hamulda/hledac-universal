[pytest]
pythonpath = .venv/lib/python3.14/site-packages
testpaths =
    tests

python_files =
    test_*.py
    *_test.py

python_classes =
    Test*

python_functions =
    test_*

norecursedirs =
    .git
    .hg
    .svn
    .tox
    .nox
    .venv
    venv
    env
    build
    dist
    htmlcov
    .pytest_cache
    .mypy_cache
    .ruff_cache
    .hypothesis
    __pycache__
    node_modules
    artifacts
    reports
    archive
    tmp
    temp

markers =
    asyncio: async tests handled by pytest-asyncio
    slow: slow tests, exclude with -m "not slow"
    live: tests requiring live network or external services
    integration: integration tests
    ghost_deleted: tests for deleted modules (MARLCoordinator, PressureLevel, etc.)
    smoke: smoke tests
    mlx: Apple Silicon MLX tests
    torch: PyTorch tests
    browser: browser or Playwright tests
    hermetic: tests that must run without network or external services
    stress: stress/load tests, exclude from default local runs
    legacy: legacy tests for deprecated or migrated surfaces
    monolith: very large monolithic tests, run explicitly only
    archival: historical regression tests for old sprint contracts

asyncio_mode = auto

addopts =
    -ra
